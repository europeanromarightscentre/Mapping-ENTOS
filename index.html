<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operation ENTOS: Police Raids Tracker</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        #map { height: 500px; width: 100%; border: 1px solid #ddd; border-radius: 8px; margin: 20px 0; }
        .info-box { position: absolute; top: 10px; right: 10px; z-index: 1000; background: white; padding: 15px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.2); max-width: 300px; font-size: 14px; line-height: 1.4; }
        h2 { margin-top: 0; font-size: 16px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        p { margin: 5px 0; color: #555; }
        .stat { font-weight: bold; color: #d32f2f; }
        .footer-attribution { position: absolute; bottom: 5px; right: 5px; z-index: 1000; font-size: 11px; background: rgba(255,255,255,0.8); padding: 2px 5px; border-radius: 3px; }
        .popup-content strong { color: #d32f2f; display: block; margin-bottom: 4px; }
        .popup-link { display: inline-block; margin-top: 8px; padding: 6px 12px; background-color: #1976d2; color: white !important; text-decoration: none; border-radius: 4px; font-size: 12px; font-weight: bold; text-align: center; }
        .popup-link:hover { background-color: #1565c0; }
        .loading { text-align: center; padding: 50px; font-size: 18px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>Operation ENTOS: Police Raids Tracker</h1>
    <p>This interactive map tracks documented raids on Roma communities in Greece. Data is updated automatically from the source file.</p>
    
    <div id="map"></div>
    <div class="footer-attribution">
        &copy; <a href="https://carto.com/attributions" target="_blank">CARTO</a> | Data: Jonathan Lee / ERRC
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Leaflet MarkerCluster JS -->
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    // Initialize Map
    var map = L.map('map').setView([39.0, 22.0], 7);

    // Tile Layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    // Icon
    var raidIcon = L.icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    // Create Cluster Group
    var markers = L.markerClusterGroup();

    // Fetch Data from JSON
    fetch('data.json')
        .then(response => {
            if (!response.ok) throw new Error("Network response was not ok");
            return response.json();
        })
        .then(data => {
            // Update stats in info box
            document.querySelector('.stat').innerText = data.length;

            data.forEach(raid => {
                var marker = L.marker([raid.lat, raid.lng], {icon: raidIcon});
                
                var popupContent = `
                    <div class="popup-content">
                        <strong>${raid.date}</strong>
                        <strong>Location:</strong> ${raid.loc}<br>
                        <strong>Offences:</strong> ${raid.offences}<br>
                        <strong>Details:</strong> ${raid.desc}
                        <a href="${raid.link}" target="_blank" class="popup-link">View Police Report</a>
                    </div>
                `;
                
                marker.bindPopup(popupContent);
                markers.addLayer(marker);
            });

            map.addLayer(markers);
        })
        .catch(error => {
            console.error('Error loading data:', error);
            document.getElementById('map').innerHTML = '<div class="loading">Error loading data. Please check data.json.</div>';
        });
</script>

</body>
</html>
