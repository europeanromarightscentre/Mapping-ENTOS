<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopCrawler — ENTOS Police Raids Tracker</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Marker Cluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent: #00bcd4;
            --accent-hover: #0097a7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Google Translate Widget Position */
        #google_translate_element {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            background: var(--card-bg);
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #333;
        }

        /* Hide Google Translate Top Banner (the annoying blue bar) */
        .goog-te-banner-frame { display: none !important; }
        body { top: 0 !important; }

        /* Fix Google Select Styling on Dark Theme */
        .goog-te-combo {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 14px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 30px;
            padding: 20px 30px;
            background-color: #000000;
            border-bottom: 1px solid #333;
        }

        .logo-img {
            height: 100px;
            width: auto;
            display: block;
            flex-shrink: 0;
        }

        .header-text {
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            font-size: 32px;
            line-height: 1.2;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin-top: 8px;
            line-height: 1.4;
            max-width: 900px;
        }

        #map {
            height: 85vh;
            width: 100%;
        }

        /* Custom Popup Styling */
        .leaflet-popup-content-wrapper {
            background: var(--card-bg);
            color: var(--text-main);
            border-radius: 6px;
            font-size: 14px;
            max-width: 300px;
        }
        .leaflet-popup-tip {
            background: var(--card-bg);
        }
        .popup-date {
            font-weight: bold;
            color: var(--accent);
            display: block;
            margin-bottom: 5px;
            font-size: 15px;
        }
        .popup-loc {
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }
        .popup-desc {
            color: #ccc;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .popup-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
        }
        .popup-link:hover {
            text-decoration: underline;
        }
        .popup-arrests {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <!-- Google Translate Widget -->
    <div id="google_translate_element"></div>

    <header>
        <img src="errc logo black white.png" alt="ERRC Logo" class="logo-img" onerror="this.style.display='none'">
        <div class="header-text">
            <h1>CopCrawler</h1>
            <p class="subtitle">Cops are Creeps: Crawling Hellenic Police websites for anti-Roma police raids under Operation ENTOS.</p>
        </div>
    </header>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- Google Translate Script -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',  // BASE LANGUAGE IS ENGLISH
                includedLanguages: 'el,fr,de,it,es,ro,hu,bg,sr,hr,sk,cs,pl,da,nl,sv,fi,pt,tr,ru,uk,en', // Languages to offer
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // --- CONFIGURATION ---
        const DATA_URL = 'data_v2.json';
        let map, markers;
        let raidData = [];

        // --- INITIALIZATION ---
        async function init() {
            map = L.map('map').setView([39.0, 22.0], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);

            markers = L.markerClusterGroup({
                showCoverageOnHover: false,
                spiderfyOnMaxZoom: true,
                removeOutsideVisibleBounds: true,
                animate: true
            });
            map.addLayer(markers);

            try {
                const response = await fetch(DATA_URL);
                raidData = await response.json();
                renderMarkers();
            } catch (error) {
                console.error("Error loading data:", error);
            }
        }

        // --- RENDER MARKERS ---
        function renderMarkers() {
            markers.clearLayers();

            raidData.forEach(entry => {
                if (!entry.lat || !entry.lng) return;

                const popupContent = `
                    <span class="popup-date">${entry.date}</span>
                    <div class="popup-loc">📍 ${entry.loc}</div>
                    ${entry.arrests && entry.arrests !== "0" ? `<span class="popup-arrests">🔒 ${entry.arrests} arrests</span>` : ''}
                    <div class="popup-desc">${entry.desc}</div>
                    <a href="${entry.link}" target="_blank" class="popup-link">🔗 View Source</a>
                `;

                const marker = L.marker([entry.lat, entry.lng]);
                marker.bindPopup(popupContent, { maxWidth: 300 });
                markers.addLayer(marker);
            });
        }

        init();
    </script>
</body>
</html>
